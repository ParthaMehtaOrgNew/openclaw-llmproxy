  .badge { margin-top: 10px; display: inline-block; padding: 3px 10px; border-radius: 12px; font-family: -apple-system, sans-serif; font-size: 9px; font-weight: 600; background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <div class="title">OpenClaw</div>
