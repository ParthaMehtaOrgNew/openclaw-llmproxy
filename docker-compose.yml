services:
  proxy:
    build: .
    ports:
      - "8005:8000"
    environment:
      - PROXY_API_KEY=${PROXY_API_KEY:-}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-60}
      - MAX_REQUEST_SIZE_MB=${MAX_REQUEST_SIZE_MB:-10}
      - CACHE_TTL_S=${CACHE_TTL_S:-3600}
      - CACHE_MAX_ENTRIES=${CACHE_MAX_ENTRIES:-1000}
      - SECURITY_PII_MODE=${SECURITY_PII_MODE:-log}
      - SECURITY_INJECTION_MODE=${SECURITY_INJECTION_MODE:-log}
      - SECURITY_WEBHOOK_URL=${SECURITY_WEBHOOK_URL:-}
      - LOG_REDACT_BODIES=${LOG_REDACT_BODIES:-false}
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_CLUSTER=${REDIS_CLUSTER:-false}
      - DATABASE_URL=${DATABASE_URL:-postgresql://openclaw:openclaw@postgres:5432/openclaw}
      - DATABASE_READ_URL=${DATABASE_READ_URL:-}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_TOPIC=${KAFKA_TOPIC:-llmproxy.requests}
    volumes:
      - ./logs:/app/logs
      - ./backends.docker.json:/app/backends.json:ro
    depends_on:
      - ollama
      - redis
      - postgres
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw
      POSTGRES_DB: openclaw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: openclaw-llmproxy-kafka-001
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  monitor:
    build: .
    entrypoint: ["python", "scripts/monitor.py"]
    command: ["--url", "http://proxy:8000", "--interval", "60", "--api-key", "${PROXY_API_KEY:-}"]
    volumes:
      - ./scripts:/app/scripts:ro
    depends_on:
      - proxy
    restart: unless-stopped

volumes:
  ollama_data:
  redis_data:
  postgres_data:
  kafka_data:
