name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t openclaw-llmproxy:test .

      - name: Start proxy in Docker
        run: |
          docker run -d --name proxy-test -p 8005:8000 \
            -e PROXY_API_KEY=ci-test-key \
            openclaw-llmproxy:test
          sleep 3

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8005/health)
          echo "Health check: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Auth enforcement check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8005/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model": "test", "messages": [{"role": "user", "content": "hi"}]}')
          echo "No-auth request: HTTP $STATUS"
          [ "$STATUS" = "401" ] || exit 1

      - name: Dashboard accessible
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8005/dashboard)
          echo "Dashboard: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Run smoke tests
        run: bash scripts/smoke_test.sh http://localhost:8005 ci-test-key

      - name: Run monitor (single check)
        run: python scripts/monitor.py --url http://localhost:8005 --api-key ci-test-key --once

      - name: Cleanup
        if: always()
        run: docker rm -f proxy-test
